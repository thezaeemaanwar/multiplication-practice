<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fractions ⇄ Percentages</title>
		<link rel="stylesheet" href="global.css" />
		<link rel="stylesheet" href="fractions.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="container">
			<!-- Settings screen -->
			<section id="settings-screen" class="screen">
				<h1>Fractions ⇄ Percentages</h1>

				<div class="field">
					<label>Direction</label>
					<div class="mode-options">
						<label class="mode-option">
							<input type="radio" name="direction" value="toPercent" checked />
							Fraction → %
						</label>
						<label class="mode-option">
							<input type="radio" name="direction" value="toFraction" />
							% → Fraction
						</label>
						<label class="mode-option">
							<input type="radio" name="direction" value="mixed" />
							Mixed
						</label>
					</div>
				</div>

				<div class="field">
					<label for="num-questions">Number of questions</label>
					<input type="number" id="num-questions" min="1" max="100" value="10" />
				</div>

				<p id="settings-error" class="error" hidden></p>

				<button type="button" id="start-btn" class="primary">Start</button>

				<a href="index.html" class="nav-link">← Back to home</a>
			</section>

			<!-- Quiz screen -->
			<section id="quiz-screen" class="screen" hidden>
				<div class="quiz-header">
					<span id="progress">Question 1 / 10</span>
				</div>

				<div id="question" class="question">1/2 = ? %</div>

				<input type="text" id="answer" class="answer" autocomplete="off" placeholder="Answer" />

				<p id="hint" class="hint"></p>

				<button type="button" id="next-btn" class="primary">Next</button>
			</section>

			<!-- Results screen -->
			<section id="results-screen" class="screen" hidden>
				<h1>Results</h1>
				<p id="score" class="score">You scored 0 / 0</p>
				<ul id="review-list" class="review-list"></ul>
				<button type="button" id="restart-btn" class="primary">Play again</button>
				<a href="index.html" class="nav-link">← Back to home</a>
			</section>
		</div>

		<footer class="footer">
			Made with ❤️ by
			<a href="https://github.com/thezaeemaanwar" target="_blank" rel="noopener">thezaeemaanwar</a>
			· <a href="https://github.com/thezaeemaanwar/multiplication-practice" target="_blank" rel="noopener">⭐ Star / contribute on GitHub</a>
		</footer>

		<script src="fractions.js"></script>
	</body>
</html>
