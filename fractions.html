<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fractions to Percentages Practice — Free Conversion Trainer</title>

			content="Practice converting common fractions to percentages and back (e.g. 1/2 = 50%). Answers accept shortened decimals without rounding. Free, no sign-up, works on any device."

			content="fractions to percentages, percentage to fraction, fraction percentage conversion, common fractions, percentage practice, convert fractions, math practice, fraction decimal percent"

		<meta
			property="og:description"
			content="Convert common fractions to percentages and back (e.g. 1/2 = 50%). Answers accept shortened decimals without rounding."
		/>
		<meta property="og:url" content="https://thezaeemaanwar.github.io/multiplication-practice/fractions.html" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Fractions to Percentages Practice — Free Conversion Trainer" />

			name="twitter:description"
			content="Convert common fractions to percentages and back (e.g. 1/2 = 50%). Free, no sign-up."

		<link rel="stylesheet" href="global.css" />
		<link rel="stylesheet" href="fractions.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="container">
			<!-- Settings screen -->
			<section id="settings-screen" class="screen">
				<h1>Fractions ⇄ Percentages</h1>

				<div class="field">
					<label>Direction</label>
					<div class="mode-options">
						<label class="mode-option">
							<input type="radio" name="direction" value="toPercent" checked />
							Fraction → %
						</label>
						<label class="mode-option">
							<input type="radio" name="direction" value="toFraction" />
							% → Fraction
						</label>
						<label class="mode-option">
							<input type="radio" name="direction" value="mixed" />
							Mixed
						</label>
					</div>
				</div>

				<div class="field">
					<label for="num-questions">Number of questions</label>
					<input type="number" id="num-questions" min="1" max="100" value="10" />
				</div>

				<p id="settings-error" class="error" hidden></p>

				<button type="button" id="start-btn" class="primary">Start</button>

				<a href="index.html" class="nav-link">← Back to home</a>
			</section>

			<!-- Quiz screen -->
			<section id="quiz-screen" class="screen" hidden>
				<div class="quiz-header">
					<span id="progress">Question 1 / 10</span>
				</div>

				<div id="question" class="question">1/2 = ? %</div>

				<input type="text" id="answer" class="answer" autocomplete="off" placeholder="Answer" />

				<p id="hint" class="hint"></p>

				<button type="button" id="next-btn" class="primary">Next</button>

				<a href="index.html" class="nav-link">← Back to home</a>
			</section>

			<!-- Results screen -->
			<section id="results-screen" class="screen" hidden>
				<h1>Results</h1>
				<p id="score" class="score">You scored 0 / 0</p>
				<ul id="review-list" class="review-list"></ul>
				<button type="button" id="restart-btn" class="primary">Play again</button>
				<a href="index.html" class="nav-link">← Back to home</a>
			</section>
		</div>

		<footer class="footer">
			Made with <span class="material-symbols-outlined filled heart">favorite</span> by
			<a href="https://github.com/thezaeemaanwar" target="_blank" rel="noopener">thezaeemaanwar</a>

		</footer>

		<script src="fractions.js"></script>
	</body>
</html>
