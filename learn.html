<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Learn the Tables</title>
		<link rel="stylesheet" href="global.css" />
		<link rel="stylesheet" href="multiplication.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="container">
			<h1>Learn the Tables</h1>

			<div class="field">
				<label for="table-input">Which table do you want to learn?</label>
				<div class="learn-controls">
					<input type="number" id="table-input" min="1" max="20" value="7" />
					<button type="button" id="show-btn" class="primary compact">Show</button>
				</div>
			</div>

			<div class="learn-actions">
				<button type="button" id="mode-btn" class="link-btn"><span class="material-symbols-outlined">edit</span> Practice this table</button>
				<button type="button" id="check-btn" class="link-btn" hidden><span class="material-symbols-outlined">check_circle</span> Check answers</button>
			</div>

			<ol id="table-list" class="table-list"></ol>

			<p id="practice-result" class="practice-result" hidden></p>

			<a href="index.html" class="nav-link">← Back to home</a>
		</div>

		<footer class="footer">
			Made with <span class="material-symbols-outlined filled heart">favorite</span> by
			<a href="https://github.com/thezaeemaanwar" target="_blank" rel="noopener">thezaeemaanwar</a>
			· <a href="https://github.com/thezaeemaanwar/multiplication-practice" target="_blank" rel="noopener"><span class="material-symbols-outlined filled">star</span> Star / contribute on GitHub</a>
		</footer>

		<script src="learn.js"></script>
	</body>
</html>
