	<body>
		<div class="container">
			<h1>Learn the Tables</h1>

			<div class="field">
				<label for="table-input">Which table do you want to learn?</label>
				<div class="learn-controls">
					<input type="number" id="table-input" min="1" max="20" value="7" />
					<button type="button" id="show-btn" class="primary compact">Show</button>
				</div>
			</div>

			<div class="learn-actions">
				<button type="button" id="mode-btn" class="link-btn"><span class="material-symbols-outlined">edit</span> Practice this table</button>
				<button type="button" id="check-btn" class="link-btn" hidden><span class="material-symbols-outlined">check_circle</span> Check answers</button>
			</div>

			<ol id="table-list" class="table-list"></ol>
