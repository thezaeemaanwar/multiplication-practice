		<link rel="stylesheet" href="../global.css" />
		<link rel="stylesheet" href="squares.css" />

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="container">
			<!-- Settings screen -->
			<section id="settings-screen" class="screen">
				<h1>Squares & Square Roots</h1>

				<div class="field">
					<label>Operation</label>
					<div class="mode-options">
						<label class="mode-option">
							<input type="radio" name="operation" value="square" checked />
							Square n²
						</label>
						<label class="mode-option">
							<input type="radio" name="operation" value="root" />
							Root √
						</label>
						<label class="mode-option">
							<input type="radio" name="operation" value="mixed" />
							Mixed
						</label>
					</div>
				</div>

				<div class="field">
					<label for="max-base">Largest base</label>
					<input type="number" id="max-base" min="2" max="100" value="12" />
				</div>

				<div class="field">
					<label>Quiz mode</label>
					<div class="mode-options">
						<label class="mode-option">
							<input type="radio" name="mode" value="questions" checked />
							Number of questions
						</label>
						<label class="mode-option">
							<input type="radio" name="mode" value="time" />
							Fixed total time
						</label>
					</div>
				</div>

				<!-- Questions mode settings -->
				<div id="questions-settings">
					<div class="field">
						<label for="num-questions">Number of questions</label>
						<input type="number" id="num-questions" min="1" max="100" value="10" />
					</div>
				</div>

				<!-- Time mode settings -->
				<div id="time-settings" hidden>
					<div class="field">
						<label for="total-time">Total time (minutes)</label>
						<input type="number" id="total-time" min="1" max="120" value="10" />
					</div>
				</div>

				<!-- Shared: applies to both modes -->
				<div class="field">
					<label for="time-per-question">Time per question (seconds)</label>
					<input type="number" id="time-per-question" min="1" max="120" value="10" />
				</div>

				<p id="settings-error" class="error" hidden></p>

				<button type="button" id="start-btn" class="primary">Start</button>

				<a href="../index.html" class="nav-link">← Back to home</a>
			</section>

			<!-- Quiz screen -->
			<section id="quiz-screen" class="screen" hidden>
				<div class="quiz-header">
					<span id="progress">Question 1 / 10</span>
					<div class="timers">
						<span id="total-timer" class="timer total" hidden>10:00</span>
						<span id="timer" class="timer">10</span>
					</div>
				</div>

				<div id="question" class="question">7²</div>

				<input type="number" id="answer" class="answer" inputmode="numeric" autocomplete="off" placeholder="Answer" />

				<button type="button" id="next-btn" class="primary">Next</button>

				<a href="../index.html" class="nav-link">← Back to home</a>
			</section>

			<!-- Results screen -->
			<section id="results-screen" class="screen" hidden>
				<h1>Results</h1>
				<p id="score" class="score">You scored 0 / 0</p>
				<ul id="review-list" class="review-list"></ul>
				<button type="button" id="restart-btn" class="primary">Play again</button>
				<a href="../index.html" class="nav-link">← Back to home</a>
			</section>
		</div>

		<footer class="footer">
			Made with <span class="material-symbols-outlined filled heart">favorite</span> by

		</footer>

		<script src="squares.js"></script>
	</body>
</html>
